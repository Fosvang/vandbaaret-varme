        device_class: opening
        icon: mdi:valve-open
        state: >
          {% set e = states('input_text.vv_zone_8_aktuator_entity') %}
          {{ states(e) in ['on', 'open', 'heat', 'heating'] or state_attr(e, 'hvac_action') == 'heating' }}

      - name: VV zone aktuator aktiv
        unique_id: vv_zone_aktuator_aktiv
        icon: mdi:valve
        state: >
          {{ is_state('binary_sensor.vv_zone_1_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_2_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_3_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_4_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_5_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_6_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_7_aktuator_aaben', 'on')
              or is_state('binary_sensor.vv_zone_8_aktuator_aaben', 'on') }}

      - name: VV sensorfejl
        unique_id: vv_sensorfejl
        device_class: problem
        icon: mdi:connection
        state: >
          {{ states('sensor.vv_zone_1_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_2_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_3_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_4_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_5_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_6_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_7_temperatur') in ['unknown', 'unavailable', 'none', '']
              or states('sensor.vv_zone_8_temperatur') in ['unknown', 'unavailable', 'none', ''] }}

      - name: VV zone temperatur alarm
        unique_id: vv_zone_temperatur_alarm
        device_class: problem
        icon: mdi:home-alert
        state: >
          {{ states('sensor.vv_zone_1_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_2_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_3_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_4_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_5_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_6_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_7_status') in ['For kold', 'For varm']
              or states('sensor.vv_zone_8_status') in ['For kold', 'For varm'] }}

      - name: VV alarm aktiv
        unique_id: vv_alarm_aktiv
        device_class: problem
        icon: mdi:alert-circle
        state: "{{ is_state('input_boolean.vv_alarm_latch', 'on') }}"

automation:
  - id: vv_alarm_taend
    alias: VV alarm - taend ved fejl
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.vv_sensorfejl
          - binary_sensor.vv_zone_temperatur_alarm
        to: "on"
        for:
          minutes: 2
    condition:
      - condition: state
        entity_id: input_boolean.vv_overvaagning_aktiv
        state: "on"
      - condition: template
        value_template: "{{ states('input_select.vv_driftvalg') != 'Service' }}"
      - condition: state
        entity_id: input_boolean.vv_alarm_latch
        state: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.vv_alarm_latch
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.vv_alarm_ack
      - service: script.vv_send_alarm
        data:
          title: "Vandbaaret varme alarm"
          message: >
            {{ states('sensor.vv_alarm_arsag') }}
            Status: {{ states('sensor.vv_status') }}.
            Anbefaling: {{ states('sensor.vv_anbefaling') }}

  - id: vv_alarm_sluk
    alias: VV alarm - nulstil naar normal
    mode: single
    trigger:
      - platform: state
        entity_id:
          - binary_sensor.vv_sensorfejl
          - binary_sensor.vv_zone_temperatur_alarm
        to: "off"
        for:
          minutes: 5
    condition:
      - condition: state
        entity_id: input_boolean.vv_alarm_latch
        state: "on"
      - condition: template
        value_template: >
          {{ is_state('binary_sensor.vv_sensorfejl', 'off')
              and is_state('binary_sensor.vv_zone_temperatur_alarm', 'off') }}
    action:
      - service: script.vv_alarm_reset
      - service: script.vv_send_alarm
        data:
          title: "Vandbaaret varme normal"
          message: >
            Anlaegget er tilbage i normal drift.

  - id: vv_alarm_gentag
    alias: VV alarm - gentag aktiv alarm
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: state
        entity_id: input_boolean.vv_overvaagning_aktiv
        state: "on"
      - condition: state
        entity_id: input_boolean.vv_alarm_latch
        state: "on"
      - condition: state
        entity_id: input_boolean.vv_alarm_ack
        state: "off"
      - condition: state
        entity_id: input_boolean.vv_alarm_muted
        state: "off"
      - condition: template
        value_template: >
          {% set repeat = states('input_number.vv_alarm_repeat_min') | int(30) %}
          {{ repeat > 0 and now().minute % repeat == 0 }}
    action:
      - service: script.vv_send_alarm
        data:
          title: "Vandbaaret varme alarm stadig aktiv"
          message: >
            {{ states('sensor.vv_alarm_arsag') }}
            Anbefaling: {{ states('sensor.vv_anbefaling') }}

  - id: vv_alarm_pause_timer_slut
    alias: VV alarm - pause slut
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.vv_alarm_mute_2h
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.vv_alarm_muted
