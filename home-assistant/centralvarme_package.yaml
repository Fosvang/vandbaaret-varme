          {% set max = states('input_number.vv_zone_temp_max') | float(24) %}
          {% if t is none %}Sensorfejl{% elif t < min %}For kold{% elif t > max %}For varm{% else %}OK{% endif %}

      - name: VV zone 5 status
        unique_id: vv_zone_5_status
        icon: mdi:home-thermometer
        state: >
          {% set t = states('sensor.vv_zone_5_temperatur') | float(none) %}
          {% set min = states('input_number.vv_zone_temp_min') | float(18) %}
