        icon: mdi:valve-open
        state: >
          {% set e = states('input_text.vv_zone_7_aktuator_entity') %}
          {{ states(e) in ['on', 'open', 'heat', 'heating'] or state_attr(e, 'hvac_action') == 'heating' }}

      - name: VV zone 8 aktuator aaben
