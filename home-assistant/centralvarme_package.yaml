        icon: mdi:home-thermometer
        state: >
          {% set t = states('sensor.vv_zone_6_temperatur') | float(none) %}
          {% set min = states('input_number.vv_zone_temp_min') | float(18) %}
          {% set max = states('input_number.vv_zone_temp_max') | float(24) %}
          {% if t is none %}Sensorfejl{% elif t < min %}For kold{% elif t > max %}For varm{% else %}OK{% endif %}

      - name: VV zone 7 status
        unique_id: vv_zone_7_status
        icon: mdi:home-thermometer
        state: >
          {% set t = states('sensor.vv_zone_7_temperatur') | float(none) %}
          {% set min = states('input_number.vv_zone_temp_min') | float(18) %}
          {% set max = states('input_number.vv_zone_temp_max') | float(24) %}
          {% if t is none %}Sensorfejl{% elif t < min %}For kold{% elif t > max %}For varm{% else %}OK{% endif %}

      - name: VV zone 8 status
        unique_id: vv_zone_8_status
        icon: mdi:home-thermometer
        state: >
          {% set t = states('sensor.vv_zone_8_temperatur') | float(none) %}
          {% set min = states('input_number.vv_zone_temp_min') | float(18) %}
          {% set max = states('input_number.vv_zone_temp_max') | float(24) %}
          {% if t is none %}Sensorfejl{% elif t < min %}For kold{% elif t > max %}For varm{% else %}OK{% endif %}

      - name: VV status
        unique_id: vv_status
        icon: >
          {% if is_state('binary_sensor.vv_alarm_aktiv', 'on') %}mdi:alert
          {% elif is_state('binary_sensor.vv_zone_aktuator_aktiv', 'on') %}mdi:heat-wave
          {% else %}mdi:check-circle
          {% endif %}
        state: >
          {% if is_state('binary_sensor.vv_sensorfejl', 'on') %}Sensorfejl
          {% elif is_state('input_boolean.vv_alarm_latch', 'on') %}Alarm
          {% elif is_state('binary_sensor.vv_zone_temperatur_alarm', 'on') %}Komfortalarm
          {% elif is_state('binary_sensor.vv_zone_aktuator_aktiv', 'on') %}Varme aktiv
          {% else %}Normal{% endif %}

      - name: VV alarm arsag
        unique_id: vv_alarm_arsag
        icon: mdi:alert-decagram
        state: >
          {% if is_state('binary_sensor.vv_sensorfejl', 'on') %}En eller flere sensorer mangler eller er utilgaengelige.
          {% elif is_state('binary_sensor.vv_zone_temperatur_alarm', 'on') %}En eller flere zoner ligger uden for de valgte temperaturgraenser.
          {% else %}Ingen alarm{% endif %}

      - name: VV anbefaling
        unique_id: vv_anbefaling
        icon: mdi:lightbulb-on-outline
        state: >
          {% if is_state('binary_sensor.vv_sensorfejl', 'on') %}Kontroller sensor- og aktuatorfelter under Opsaetning.
          {% elif is_state('binary_sensor.vv_zone_temperatur_alarm', 'on') %}Kontroller setpunkt, rumfoelerplacering og om aktuatoren faktisk aabner.
          {% else %}Anlaegget ser normalt ud.{% endif %}

      - name: VV drift score
        unique_id: vv_drift_score
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:gauge
        state: >
          {% set score = 100 %}
          {% if is_state('binary_sensor.vv_sensorfejl', 'on') %}{% set score = score - 35 %}{% endif %}
          {% if is_state('binary_sensor.vv_zone_temperatur_alarm', 'on') %}{% set score = score - 15 %}{% endif %}
          {{ [0, score] | max }}

      - name: VV SMS status
        unique_id: vv_sms_status
        icon: mdi:message-check
        state: >
          {% set raw = states('input_text.vv_sms_modtager') %}
          {% set normalized = raw | replace(';', ',') | replace('\n', ',') %}
          {% set count = normalized.split(',') | map('trim') | reject('eq', '') | list | count %}
          {% if not is_state('input_boolean.vv_sms_aktiv', 'on') %}Deaktiveret
          {% elif count == 0 %}Modtager mangler
          {% else %}Klar{% endif %}

      - name: VV notifikation status
        unique_id: vv_notifikation_status
        icon: >
          {% set service = states('input_text.vv_notify_service') | trim %}
          {% if not is_state('input_boolean.vv_notifikation_aktiv', 'on') %}mdi:bell-off
          {% elif service == 'persistent_notification.create' or service.startswith('notify.') %}mdi:bell-check
          {% else %}mdi:bell-alert
          {% endif %}
        state: >
          {% set service = states('input_text.vv_notify_service') | trim %}
          {% if not is_state('input_boolean.vv_notifikation_aktiv', 'on') %}
            Deaktiveret
          {% elif service == 'persistent_notification.create' %}
            Home Assistant intern besked
          {% elif service.startswith('notify.') %}
            Klar
          {% elif service in ['unknown', 'unavailable', 'none', ''] %}
            Service mangler
          {% else %}
            Ugyldig service
          {% endif %}

